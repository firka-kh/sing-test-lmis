spring.application.name=verification-portal

# H2 Database — файловое хранение (данные сохраняются при перезапуске)
spring.datasource.url=jdbc:h2:file:./data/verification-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (для отладки, доступен по /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
